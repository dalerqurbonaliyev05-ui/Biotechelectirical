 <!-- Background shapes -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Glassmorphism login form -->
    <div class="glass-container">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Sign in to your account to continue</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Username or Email" id="username" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" id="password" required>
            </div>

            <div class="remember-forgot">
                <label class="remember">
                    <input type="checkbox" id="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Sign In</button>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div class="social-login">
                <div class="social-btn" title="Sign in with Google">
                    <i class="fab fa-google"></i>
                </div>
                <div class="social-btn" title="Sign in with Facebook">
                    <i class="fab fa-facebook-f"></i>
                </div>
                <div class="social-btn" title="Sign in with Twitter">
                    <i class="fab fa-twitter"></i>
                </div>
            </div>

            <p class="register-link">
                Don't have an account?
                <a href="#">Sign up</a>
            </p>
        </form>
    </div>

    <!-- Browser compatibility notice -->
    <div class="browser-notice" id="browserNotice">
        For the best experience, please use a modern browser that supports backdrop-filter.
    </div>
