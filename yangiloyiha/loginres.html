<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RES - Tizimga kirish</title>
    <style>
        /* Sahifa dizayni */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        .login-card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #2980b9;
        }
        #message {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        .loading { color: #f39c12; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="rasm14.jfif" alt="Logo" style="margin-bottom: 10px; border-radius: 50%; width: 80px; height: 80px; object-fit: cover;">
    <h2>RES Tizimi</h2>
    
    <div class="input-group">
        <label for="username">Login(ID)</label>
        <input type="email" id="username" placeholder="Ishchi Xodim(ID)">
    </div>
    
    <div class="input-group">
        <label for="password">Parol</label>
        <input type="password" id="password" placeholder="******">
    </div>
    <p class="info"> Talabalarga  <a href="royxatgaolish.html">Ro'yxatdan o'tish</a></p>
    
    <button class="btn-login" onclick="validateLogin()">Kirish</button>
    
    <div id="message"></div>
</div>

<script type="module">
  // 1. Firebase modullarini import qilish
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // 2. Firebase konfiguratsiyasi
  const firebaseConfig = {
    apiKey: "AIzaSyD7DcRJycK5v5MnaU1mKfyZo5Wvv0dofVo",
    authDomain: "myhemis-7cdf1.firebaseapp.com",
    projectId: "myhemis-7cdf1",
    storageBucket: "myhemis-7cdf1.firebasestorage.app",
    messagingSenderId: "364780333759",
    appId: "1:364780333759:web:c8c1bf075d0685b4ec740a"
  };

  // 3. Firebaseni ishga tushirish
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 4. Login funksiyasi (window orqali HTMLga bog'laymiz)
  window.validateLogin = function() {
    const email = document.getElementById('username').value; 
    const pass = document.getElementById('password').value;
    const message = document.getElementById('message');

    if (!email || !pass) {
        message.innerHTML = "<span class='error'>Iltimos, barcha maydonlarni to'ldiring!</span>";
        return;
    }

    message.innerHTML = "<span class='loading'>Tekshirilmoqda...</span>";

    // Firebase orqali kirish
    signInWithEmailAndPassword(auth, email, pass)
      .then((userCredential) => {
        const user = userCredential.user;
        message.innerHTML = `<span class='success'>Muvaffaqiyatli! Yo'naltirilmoqda...</span>`;
        
        // --- YO'NALTIRISH MANTIQI ---
        setTimeout(() => {
            let targetPage = "dashboard.html"; // Standart foydalanuvchilar uchun

            // Emailga qarab sahifani tanlash
            if (user.email === "daler_res@gmail.com") {
                targetPage = "talaba.html";
            } else if (user.email === "muhandis@res.uz") {
                targetPage = "technical.html";
            } else if (user.email === "boshliq@res.uz") {
                targetPage = "reports.html";
            }

            // Sahifaga o'tish
            window.location.href = targetPage;
        }, 1500);

      })
      .catch((error) => {
        let errorMsg = "Xatolik yuz berdi";
        
        // Firebase xatoliklarini tahlil qilish
        switch (error.code) {
            case 'auth/user-not-found':
                errorMsg = "Bunday foydalanuvchi mavjud emas";
                break;
            case 'auth/wrong-password':
                errorMsg = "Parol noto'g'ri";
                break;
            case 'auth/invalid-email':
                errorMsg = "Email manzili noto'g'ri yozilgan";
                break;
            case 'auth/invalid-credential':
                errorMsg = "Login yoki parol noto'g'ri";
                break;
            default:
                errorMsg = "Kirishda xatolik: " + error.message;
        }
        
        message.innerHTML = `<span class='error'>${errorMsg}</span>`;
      });
  }
</script>

</body>
</html>
