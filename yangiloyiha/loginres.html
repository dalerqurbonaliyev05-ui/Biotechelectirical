<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RES-Tizimga kirish</title>
    <style>
        /* CSS: Sahifa dizayni */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        .login-card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; /* Padding ichkarida qolishi uchun */
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #2980b9;
        }
        #message {
            margin-top: 15px;
            font-size: 14px;
        }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://via.placeholder.com/80" alt="Logo" style="margin-bottom: 10px; border-radius: 50%;">
    <h2>RES Tizimi</h2>
    
    <div class="input-group">
        <label for="username">Login (ID)</label>
        <input type="text" id="username" placeholder="Ishchi Xodim(ID)">
    </div>
    
    <div class="input-group">
        <label for="password">Parol</label>
        <input type="password" id="password" placeholder="******">
    </div>
    
    <button class="btn-login" onclick="validateLogin()">Kirish</button>
    
    <div id="message"></div>
</div>

<script>
    // JavaScript: Login va parolni tekshirish mantiqi
    function validateLogin() {
        const userField = document.getElementById('username').value;
        const passField = document.getElementById('password').value;
        const message = document.getElementById('message');

        // Oddiy tekshirish mantiqi (Buni keyinchalik baza bilan bog'laysiz)
        const validUser = "student123";
        const validPass = "pass2026";

        if (userField === "" || passField === "") {
            message.innerHTML = "<span class='error'>Iltimos, barcha maydonlarni to'ldiring!</span>";
        } 
        else if (userField === validUser && passField === validPass) {
            message.innerHTML = "<span class='success'>Muvaffaqiyatli kirildi! Yo'naltirilmoqda...</span>";
            
            // 1.5 soniyadan keyin asosiy sahifaga o'tish (masalan dashboard.html)
            setTimeout(() => {
                alert("Xush kelibsiz! Endi siz asosiy tizimga o'tasiz.");
                // window.location.href = "dashboard.html"; 
            }, 1500);
        } 
        else {
            message.innerHTML = "<span class='error'>Login yoki parol noto'g'ri!</span>";
        }
    }
  
</script>
<script type="module">
  // 1. Kerakli modullarni import qilamiz
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // 2. Sizning shaxsiy Firebase konfiguratsiyangiz
  const firebaseConfig = {
    apiKey: "AIzaSyD7DcRJycK5v5MnaU1mKfyZo5Wvv0dofVo",
    authDomain: "myhemis-7cdf1.firebaseapp.com",
    projectId: "myhemis-7cdf1",
    storageBucket: "myhemis-7cdf1.firebasestorage.app",
    messagingSenderId: "364780333759",
    appId: "1:364780333759:web:c8c1bf075d0685b4ec740a"
  };

  // 3. Firebaseni ishga tushirish
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 4. Login tugmasi bosilganda ishlaydigan funksiya
  // "window." orqali yozsak, HTML dagi onclick="validateLogin()" uni ko'ra oladi
  window.validateLogin = function() {
    const email = document.getElementById('username').value; 
    const pass = document.getElementById('password').value;
    const message = document.getElementById('message');

    // Tozalash
    message.innerHTML = "Tekshirilmoqda...";

    // Firebase orqali tekshirish
    signInWithEmailAndPassword(auth, email, pass)
      .then((userCredential) => {
        const user = userCredential.user;
        message.innerHTML = `<span style="color: green;">Muvaffaqiyatli! Kirildi: ${user.email}</span>`;
        
        // Biroz kutib, dashboard sahifasiga o'tkazish
        setTimeout(() => {
            window.location.href = "dashboard.html"; 
        }, 1500);
      })
      .catch((error) => {
        // Xatolik kodlarini o'zbekchaga o'giramiz
        let errorMsg = "Xatolik yuz berdi";
        if (error.code === 'auth/user-not-found') errorMsg = "Bunday foydalanuvchi topilmadi";
        if (error.code === 'auth/wrong-password') errorMsg = "Parol noto'g'ri";
        if (error.code === 'auth/invalid-email') errorMsg = "Email formati noto'g'ri (masalan: user@mail.com)";
        
        message.innerHTML = `<span style="color: red;">${errorMsg}</span>`;
      });
  }
</script>

</body>
</html>
