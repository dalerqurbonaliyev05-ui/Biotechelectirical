<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RES - Ro'yxatdan o'tish</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:hover { background-color: #27ae60; }
        #message { margin-top: 15px; font-size: 14px; }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Ro'yxatdan o'tish</h2>
    
    <div id="step1">
        <p style="font-size: 13px; color: #7f8c8d;">Tizimdan foydalanish uchun HEMIS ID raqamingizni kiriting</p>
        <input type="text" id="checkHemisId" placeholder="HEMIS ID (12 xonali)">
        <button class="btn" onclick="verifyHemisId()">Tasdiqlash</button>
    </div>

    <div id="step2" class="hidden">
        <p id="welcomeMsg" style="font-weight: bold; color: #3498db;"></p>
        <input type="email" id="email" placeholder="Email (masalan: user@mail.com)">
        <input type="password" id="password" placeholder="Yangi parol yarating">
        <button class="btn" onclick="completeSignup()">Akkauntni faollashtirish</button>
    </div>

    <div id="message"></div>
    <p style="margin-top:20px; font-size: 13px;">Akkauntingiz bormi? <a href="loginres.html">Kirish</a></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD7DcRJycK5v5MnaU1mKfyZo5Wvv0dofVo",
        authDomain: "myhemis-7cdf1.firebaseapp.com",
        projectId: "myhemis-7cdf1",
        storageBucket: "myhemis-7cdf1.firebasestorage.app",
        messagingSenderId: "364780333759",
        appId: "1:364780333759:web:c8c1bf075d0685b4ec740a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let verifiedStudentData = null;
    let currentHemisId = "";

    // 1-bosqich: HEMIS ID ni bazadan qidirish
    window.verifyHemisId = async function() {
        const id = document.getElementById('checkHemisId').value;
        const msg = document.getElementById('message');
        msg.innerHTML = "Tekshirilmoqda...";

        try {
            // Firestore'da 'allowed_students' kolleksiyasidan qidiramiz
            const docRef = doc(db, "allowed_students", id);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                verifiedStudentData = docSnap.data();
                currentHemisId = id;
                
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('welcomeMsg').innerText = `Xush kelibsiz, ${verifiedStudentData.fullName}!`;
                msg.innerHTML = "";
            } else {
                msg.innerHTML = "<span class='error'>Kechirasiz, bu HEMIS ID bazada topilmadi!</span>";
            }
        } catch (e) {
            msg.innerHTML = "<span class='error'>Xatolik yuz berdi. Internetni tekshiring.</span>";
        }
    }

    // 2-bosqich: Ro'yxatdan o'tishni yakunlash
    window.completeSignup = async function() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('message');

        if (!email || pass.length < 6) {
            return msg.innerHTML = "<span class='error'>Email va kamida 6 xonali parol kiriting!</span>";
        }

        try {
            // Firebase Auth-da akkaunt ochish
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            // 'users' kolleksiyasiga talaba ma'lumotlarini yozish
            await setDoc(doc(db, "users", user.uid), {
                fullName: verifiedStudentData.fullName,
                university: verifiedStudentData.university,
                faculty: verifiedStudentData.faculty,
                course: verifiedStudentData.course,
                hemisId: currentHemisId,
                brigade: verifiedStudentData.brigade || "Tayinlanmagan",
                mentor: verifiedStudentData.mentor || "Tayinlanmagan",
                role: "student",
                createdAt: serverTimestamp()
            });

            msg.innerHTML = "<span class='success'>Muvaffaqiyatli ro'yxatdan o'tdingiz!</span>";
            setTimeout(() => window.location.href = "loginres.html", 1500);

        } catch (e) {
            msg.innerHTML = `<span class='error'>Xato: ${e.message}</span>`;
        }
    }
</script>

</body>
</html>
