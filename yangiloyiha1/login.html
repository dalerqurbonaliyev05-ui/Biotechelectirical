<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulug'bek RES | Avtorizatsiya</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db; --primary-hover: #2980b9; --bg: #f4f7f6;
            --text-main: #2c3e50; --text-muted: #7f8c8d; --success: #2ecc71; --danger: #e74c3c;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .auth-container { background: white; width: 400px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
        
        .logo-box { text-align: center; margin-bottom: 30px; }
        .logo-box .material-icons-round { font-size: 48px; color: var(--primary); }
        .logo-box h2 { margin: 10px 0 0 0; color: var(--text-main); font-size: 22px; }
        .logo-box p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 14px; }
        
        /* Form elementlari */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .form-input { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; transition: 0.3s; background: #f8fafc; outline: none; }
        .form-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1); }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        .toggle-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
        .toggle-link span { color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: underline; }
        
        /* Bildirishnomalar */
        .alert { padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; align-items: center; gap: 8px; }
        .alert.error { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
        .alert.success { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }
        
        /* Loader */
        .loader { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.9); justify-content: center; align-items: center; z-index: 10; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Qismlarni yashirish uchun */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: bold; color: var(--text-muted);" id="loader-text">Kuting...</p>
    </div>

    <div class="logo-box">
        <span class="material-icons-round">bolt</span>
        <h2>Ulug'bek RES</h2>
        <p id="form-subtitle">Tizimga kirish</p>
    </div>

    <div id="alert-box" class="alert"></div>

    <div id="login-form">
        <div class="form-group">
            <label>Elektron pochta (Email)</label>
            <input type="email" id="login-email" class="form-input" placeholder="talaba@mail.com">
        </div>
        <div class="form-group">
            <label>Parol</label>
            <input type="password" id="login-pass" class="form-input" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="login()"><span class="material-icons-round" style="font-size: 18px;">login</span> Kirish</button>
        <div class="toggle-link">
            Hisobingiz yo'qmi? <span onclick="toggleForms('register')">Ro'yxatdan o'tish</span>
        </div>
    </div>

    <div id="register-form" class="hidden">
        <div id="reg-step-1">
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px; line-height: 1.5;">O'quv bo'limi tomonidan RES tizimiga kiritilganligingizni tasdiqlash uchun HEMIS ID raqamingizni kiriting.</p>
            <div class="form-group">
                <label>HEMIS ID</label>
                <input type="text" id="reg-hemis" class="form-input" placeholder="Masalan: 312211100543">
            </div>
            <button class="btn btn-primary" onclick="checkHemisID()"><span class="material-icons-round" style="font-size: 18px;">search</span> Tekshirish</button>
        </div>

        <div id="reg-step-2" class="hidden">
            <div class="alert success" style="display: flex;">
                <span class="material-icons-round">check_circle</span>
                <span id="found-student-name"></span>
            </div>
            <div class="form-group">
                <label>Tizimga kirish uchun Email o'ylab toping</label>
                <input type="email" id="reg-email" class="form-input" placeholder="ism@mail.com">
            </div>
            <div class="form-group">
                <label>Yangi parol o'rnating</label>
                <input type="password" id="reg-pass" class="form-input" placeholder="Eng kamida 6 ta belgi">
            </div>
            <button class="btn btn-primary" onclick="register()"><span class="material-icons-round" style="font-size: 18px;">person_add</span> Ro'yxatdan o'tish</button>
        </div>

        <div class="toggle-link">
            Hisobingiz bormi? <span onclick="toggleForms('login')">Tizimga kirish</span>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // O'zingizning Firebase konfiguratsiyangiz
    const firebaseConfig = {
        apiKey: "AIzaSyD7DcRJycK5v5MnaU1mKfyZo5Wvv0dofVo",
        authDomain: "myhemis-7cdf1.firebaseapp.com",
        projectId: "myhemis-7cdf1",
        storageBucket: "myhemis-7cdf1.firebasestorage.app",
        messagingSenderId: "364780333759",
        appId: "1:364780333759:web:c8c1bf075d0685b4ec740a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Vaqtinchalik talaba ma'lumotlarini saqlash uchun
    let tempStudentData = null;

    // UI Elementlari
    const alertBox = document.getElementById('alert-box');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loader-text');

    // Xabar chiqarish funksiyasi
    function showAlert(msg, type) {
        alertBox.innerHTML = `<span class="material-icons-round">${type === 'error' ? 'error_outline' : 'check_circle'}</span> ${msg}`;
        alertBox.className = `alert ${type}`;
        alertBox.style.display = 'flex';
        setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
    }

    function showLoader(text) { loaderText.innerText = text; loader.style.display = 'flex'; }
    function hideLoader() { loader.style.display = 'none'; }

    // Formalarni almashtirish (Login <-> Register)
    window.toggleForms = (type) => {
        alertBox.style.display = 'none';
        if (type === 'register') {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('form-subtitle').innerText = "Amaliyotga ro'yxatdan o'tish";
            // Registratsiyani boshidan boshlash
            document.getElementById('reg-step-1').classList.remove('hidden');
            document.getElementById('reg-step-2').classList.add('hidden');
            document.getElementById('reg-hemis').value = '';
        } else {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('form-subtitle').innerText = "Tizimga kirish";
        }
    };

    // 1-QADAM: HEMIS ID orqali bazani tekshirish
    window.checkHemisID = async () => {
        const hemisId = document.getElementById('reg-hemis').value.trim();
        if (!hemisId) return showAlert("HEMIS ID ni kiriting!", "error");

        showLoader("Tekshirilmoqda...");
        try {
            // Rasmda ko'rsatilganidek allowed_students bazasini qidiradi
            const docRef = doc(db, "allowed_students", hemisId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                tempStudentData = docSnap.data();
                // Tekshiruvdan o'tdi, keyingi bosqichni ochish
                document.getElementById('reg-step-1').classList.add('hidden');
                document.getElementById('reg-step-2').classList.remove('hidden');
                
                // Talabaning ismini olib ekranga chiqarish (Rasmda fullName deb yozilgan)
                const name = tempStudentData.fullName || tempStudentData.full_name || "Talaba";
                document.getElementById('found-student-name').innerHTML = `Topildi: <b>${name}</b>.<br>Endi hisob yarating.`;
            } else {
                showAlert("Sizning HEMIS ID raqamingiz RES bazasida topilmadi. O'quv bo'limiga murojaat qiling.", "error");
            }
        } catch (error) {
            console.error(error);
            showAlert("Xatolik yuz berdi. Internet aloqasini tekshiring.", "error");
        }
        hideLoader();
    };

    // 2-QADAM: Email va Parol bilan ro'yxatdan o'tish va ma'lumotlarni nusxalash
    window.register = async () => {
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-pass').value.trim();

        if (!email || !password || password.length < 6) {
            return showAlert("Email va eng kamida 6 belgili parol kiriting!", "error");
        }

        showLoader("Hisob yaratilmoqda...");
        try {
            // Firebase Auth da hisob yaratish
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCredential.user.uid;

            // allowed_students dagi tayyor ma'lumotlarni olib, yangi talabaning UID bilan asosiy 'users' bazasiga yozib qo'yamiz
            await setDoc(doc(db, "users", uid), {
                ...tempStudentData, // O'quv bo'limi kiritgan hamma malumotlarni nusxalaydi
                uid: uid,
                email: email,
                role: "student",
                registeredAt: new Date().toISOString()
            });

            showAlert("Muvaffaqiyatli ro'yxatdan o'tdingiz! Endi tizimga kiring.", "success");
            // Muvaffaqiyatli o'tgach, login oynasiga qaytarish va emailni joylab qo'yish
            setTimeout(() => {
                toggleForms('login');
                document.getElementById('login-email').value = email;
            }, 2000);

        } catch (error) {
            console.error(error);
            if (error.code === 'auth/email-already-in-use') {
                showAlert("Bu email band. Boshqa email ishlating yoki tizimga kiring.", "error");
            } else {
                showAlert("Ro'yxatdan o'tishda xatolik yuz berdi.", "error");
            }
        }
        hideLoader();
    };

    // 3-QADAM: Tizimga kirish (Login) - YAngilangan Qism (Admin va Talaba ajratilgan)
    window.login = async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-pass').value.trim();

        if (!email || !password) return showAlert("Email va parolni kiriting!", "error");

        showLoader("Tizimga kirilmoqda...");
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const uid = userCredential.user.uid;

            // ADMIN TIZIMGA KIRSA:
            // O'zingiz Firebase'da yaratgan admin elektron pochtasini yozing
            if (email === "admin@res.uz") {
                window.location.href = "admin_panel.html"; // Admin panelga yo'naltirish
                return; // Shu yerda funksiyani to'xtatamiz
            }

            // TALABA TIZIMGA KIRSA:
            const userDoc = await getDoc(doc(db, "users", uid));
            if (userDoc.exists()) {
                window.location.href = "talaba_portali.html"; // Talaba portaliga yo'naltirish
            } else {
                showAlert("Foydalanuvchi ma'lumotlari topilmadi.", "error");
            }
        } catch (error) {
            console.error(error);
            showAlert("Email yoki parol noto'g'ri!", "error");
        }
        hideLoader();
    };
</script>
</body>
</html>
